# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - det-gpi-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: npm install, build
        run: |
          npm install
          npm run build
        env:
          NEXT_PRIVATE_STANDALONE: true

      - name: Prepare Standalone Bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cp data.json .next/standalone/data.json || true
          cp users.json .next/standalone/users.json || true
          # Criar um zip do bundle standalone
          cd .next/standalone
          zip -r ../../site.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app-package
          path: site.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app-package
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0779E801B7C941BF91B9A5A8465EF218 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BB6183D6ED65499A9EE4562A3CEBEF87 }}
          subscription-id: 'cd58ce2c-2e37-4240-bede-df2585b0113a'

      - name: Set Azure Web App Settings (Clean & Mount)
        uses: azure/appservice-settings@v1
        with:
          app-name: 'det-gpi-dev'
          resource-group: 'rg-gpi-dev'
          app-settings-json: |
            [
              {
                "name": "WEBSITE_RUN_FROM_PACKAGE",
                "value": "1",
                "slotSetting": false
              },
              {
                "name": "SCM_DO_BUILD_DURING_DEPLOYMENT",
                "value": "false",
                "slotSetting": false
              },
              {
                "name": "NODE_ENV",
                "value": "production",
                "slotSetting": false
              }
            ]

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'det-gpi-dev'
          resource-group: 'rg-gpi-dev'
          package: site.zip
          startup-command: 'node server.js'